<div class="product">
  <img [src]="getImageUrl(product())" [alt]="product().name" />
  <!-- [] is a one-way binding where changes are reflected on the component and not userside-->
  <div class="details">
    <div>
      <h2>{{ product().name }}</h2>
      <p>
        {{ product().description }}
      </p>
      <p>Part Type: {{ product().category }}</p>
      <p>Available Inventory: {{ availableInventory() }}</p>
    </div>
  </div>
  <div class="price">
    @if (product().discount > 0) {
      <p>{{ product().price * (1 - product().discount) | currency }} (Sale)</p>
    } @else {
      <p>{{ product().price | currency }}</p>
    }

    <button class="cta" (click)="addToCart(product(), $event)">Buy</button>
  </div>
</div>
